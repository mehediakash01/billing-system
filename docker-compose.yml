version: '3.8'
services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo_db_container:27017/subscription-billing
      - BCRYPT_SALT_ROUND=12
    depends_on:
      - mongo_db_container
  mongo_db_container:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_billing_data:/data/db

volumes:
  mongo_billing_data: